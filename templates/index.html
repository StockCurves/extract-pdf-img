<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Slide Viewer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <span class="logo-text">PDF Slide Viewer</span>
        </div>
        <div class="upload-container">
            <form id="upload-form" enctype="multipart/form-data" style="display: flex; align-items: center; gap: 16px;">
                <input type="file" id="pdf-input" name="pdf" accept=".pdf" style="display: none;">
                <label class="checkbox-label">
                    <input type="checkbox" id="caption-checkbox"> 保留 Fig. caption
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="tables-checkbox" checked> 包含 Tables 表格
                </label>
                <button type="button" id="upload-btn" class="btn btn-primary">選擇並上傳 PDF</button>
            </form>
            <div id="loading" class="loading" style="display: none;">處理中，請稍候...</div>
        </div>
    </header>

    <main class="main-content">
        <div id="welcome-screen" class="welcome-screen">
            <div id="drop-zone" class="drop-zone">
                <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#70757a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <h2>請上傳 PDF 檔案開始使用</h2>
                <p>將 PDF 檔案拖曳至此處，或點擊下方按鈕上傳</p>
                <button type="button" id="welcome-upload-btn" class="btn btn-primary" style="margin-top: 8px;">選擇 PDF 檔案</button>
            </div>
        </div>

        <div id="viewer-container" class="viewer-container" style="display: none;">
            <!-- 左側 PDF 檢視器 -->
            <div class="panel left-panel">
                <iframe id="pdf-frame" src="" width="100%" height="100%" frameborder="0"></iframe>
            </div>

            <!-- 分割條 -->
            <div class="splitter"></div>

            <!-- 右側 PNG 投影片 -->
            <div class="panel right-panel">
                <div class="slide-viewer">
                    <div class="slide-stage" id="slide-stage">
                        <img id="current-slide" src="" alt="Slide Image">
                        <div id="crop-overlay" class="crop-overlay">
                            <div id="crop-selection" class="crop-selection" style="display: none;"></div>
                        </div>
                    </div>
                    <div class="slide-controls">
                        <button id="prev-btn" class="btn btn-secondary">上一頁</button>
                        <span id="page-indicator">第 0 / 0 頁</span>
                        <button id="next-btn" class="btn btn-secondary">下一頁</button>
                        <div style="border-left: 1px solid var(--border-color); height: 24px; margin: 0 8px;"></div>
                        <button id="crop-mode-btn" class="btn btn-secondary">編輯裁切</button>
                        <button id="crop-apply-btn" class="btn btn-primary" style="display: none;">套用裁切</button>
                        <button id="crop-reset-btn" class="btn btn-secondary" style="display: none;">復原</button>
                    </div>
                </div>
                <div class="thumbnail-bar" id="thumbnail-bar">
                    <!-- 縮圖將由 JavaScript 動態插入 -->
                </div>
            </div>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
